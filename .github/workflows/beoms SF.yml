name: 🚀 Daily Beom SF Checker

on:
  schedule:
    - cron: '15 0 * * *'   # 매일 한국 시간(KST) 오전 9:15 자동 실행
  workflow_dispatch:      # 사령관님께서 수동으로 즉시 실행 가능

jobs:
  run_bot:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 코드 체크아웃
        uses: actions/checkout@v4

      - name: 🐍 Python 설정 (3.11)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 필수 도구(Playwright) 설치
        # 이 단계가 빠져있어서 오류가 발생했던 것입니다.
        run: |
          python -m pip install --upgrade pip
          pip install playwright
          playwright install chromium
          playwright install-deps

      - name: 🚀 beom_sf_bot.py 실행
        env:
          NID_AUT: ${{ secrets.NID_AUT }}
          NID_SES: ${{ secrets.NID_SES }}
        run: python beom_sf_bot.py

      - name: 📸 결과 보고서(PNG) 업로드
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: beom-sf-report
          path: final_report.png
          retention-days: 1
