name: Weekly Intelligence Briefing

on:
  schedule:
    - cron: '0 22 * * 0'  # 매주 월요일 오전 7시 KST (일요일 UTC 22:00)
  workflow_dispatch:       # 수동 실행 가능

jobs:
  run-intelligence:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install packages
        run: pip install requests anthropic

      - name: Run Intelligence System
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          G2B_API_KEY:       ${{ secrets.G2B_API_KEY }}
          NAVER_ADDRESS:     ${{ secrets.NAVER_ADDRESS }}
          NAVER_PASSWORD:    ${{ secrets.NAVER_PASSWORD }}
        run: python daily_intelligence.py
