name: 폐렴구균 주간 학술 브리핑

on:
  schedule:
    # 매주 월요일 오전 7시 KST = UTC 일요일 22:00
    - cron: "0 22 * * 0"
  workflow_dispatch:

jobs:
  send-weekly-briefing:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install anthropic
      - env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NAVER_ADDRESS: ${{ secrets.NAVER_ADDRESS }}
          NAVER_PASSWORD: ${{ secrets.NAVER_PASSWORD }}
        run: python weekly_briefing.py
