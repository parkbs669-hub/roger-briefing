name: Weekly_Report_Briefing

on:
  schedule:
    # 매주 월요일 오전 6시 KST = UTC 일요일 21:00
    - cron: "0 21 * * 0"
  workflow_dispatch:

jobs:
  send-weekly-report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install requests
      - env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          NEWS_API_KEY:     ${{ secrets.NEWS_API_KEY }}
          NAVER_ADDRESS:    ${{ secrets.NAVER_ADDRESS }}
          NAVER_PASSWORD:   ${{ secrets.NAVER_PASSWORD }}
          WEEKLY_REPORT_RECIPIENTS: ${{ secrets.WEEKLY_REPORT_RECIPIENTS }}
          GH_PAT:            ${{ secrets.GH_PAT }}
        run: python Weekly_Report_Briefing.py
