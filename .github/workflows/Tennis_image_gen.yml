name: 🎾 Daily Tennis Image Collector

on:
  schedule:
    - cron: '0 22 * * *'   # 매일 오전 7시 KST (UTC 22:00 전날)
  workflow_dispatch:         # 수동 실행 버튼

jobs:
  collect-images:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: 📥 체크아웃
        uses: actions/checkout@v4

      - name: 🐍 Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 패키지 설치
        run: pip install requests

      - name: 🎾 이미지 수집
        env:
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
        run: python generate_tennis_images.py

      - name: 📤 커밋 & 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add images/ gallery.html
          git diff --cached --quiet || git commit -m "🎾 Daily tennis images - $(date +'%Y-%m-%d')"
          git push
