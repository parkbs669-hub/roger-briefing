name: Sales_Daily_Briefing
on:
  schedule:
    - cron: '0 0 * * 1-5'  # KST 평일(월~금) 오전 9:00 = UTC 월~금 00:00
  workflow_dispatch:

permissions:
  contents: write  # 프로젝트 타임라인 자동 커밋을 위한 쓰기 권한

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      # 1) roger-briefing 코드 + 누적 데이터 체크아웃
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # 2) GH_PAT 사전 확인 (MyVault_Roger 체크아웃에 필요)
      - name: GH_PAT 유효성 확인
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          if [ -z "$GH_PAT" ]; then
            echo "::error title=GH_PAT 누락::GH_PAT secret이 설정되지 않았습니다."
            echo "해결: Settings > Secrets and variables > Actions > New repository secret"
            echo "  이름: GH_PAT  |  값: repo 권한을 가진 Personal Access Token"
            exit 1
          fi

      # 3) MyVault_Roger 옵시디언 볼트 체크아웃 → vault/ 경로
      - uses: actions/checkout@v4
        with:
          repository: parkbs669-hub/MyVault_Roger
          token: ${{ secrets.GH_PAT }}
          path: vault

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install requests anthropic

      - env:
          ANTHROPIC_API_KEY:   ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY:      ${{ secrets.GEMINI_API_KEY }}
          NAVER_CLIENT_ID:     ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          PUBLIC_DATA_API_KEY: ${{ secrets.PUBLIC_DATA_API_KEY }}
          NAVER_ADDRESS:       ${{ secrets.NAVER_ADDRESS }}
          NAVER_PASSWORD:      ${{ secrets.NAVER_PASSWORD }}
          REPORT_RECIPIENTS:   ${{ secrets.SALES_REPORT_RECIPIENTS }}
          VAULT_DIR:           vault
          PROJECTS_DIR:        data/projects
          PATTERNS_DIR:        data/patterns
        run: python sales_daily_briefing.py

      # 프로젝트 타임라인 누적 저장 (매일 자동 커밋)
      - name: 프로젝트 타임라인 저장
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/projects/
          git diff --staged --quiet || git commit -m "chore: 프로젝트 타임라인 업데이트 $(date '+%Y-%m-%d')"
          git push
