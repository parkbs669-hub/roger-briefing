name: Sales_Daily_Briefing
on:
  schedule:
    - cron: '30 22 * * 1-5'  # 평일 오전 7:30 KST
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install requests anthropic

      - env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY:    ${{ secrets.GEMINI_API_KEY }}
          NAVER_CLIENT_ID:   ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          PUBLIC_DATA_API_KEY: ${{ secrets.PUBLIC_DATA_API_KEY }}
          NAVER_ADDRESS:     ${{ secrets.NAVER_ADDRESS }}
          NAVER_PASSWORD:    ${{ secrets.NAVER_PASSWORD }}
          REPORT_RECIPIENTS: ${{ secrets.REPORT_RECIPIENTS }}
          VAULT_DIR: vault
        run: python sales_daily_briefing.py
