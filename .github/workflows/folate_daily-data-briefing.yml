name: Folate Integrated Briefing
on:
  schedule:
    - cron: '0 23 * * *' # 매일 오전 8시 KST (UTC 23:00)
  workflow_dispatch:     # GitHub 웹에서 수동 버튼 클릭 가능
jobs:
  run-daily-briefing:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Python environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: pip install requests
        
      - name: Execute Briefing Script
        env:
          PUBLIC_DATA_API_KEY: ${{ secrets.PUBLIC_DATA_API_KEY }}
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          NAVER_ADDRESS: ${{ secrets.NAVER_ADDRESS }}
          NAVER_PASSWORD: ${{ secrets.NAVER_PASSWORD }}
        run: python folate_daily_data_briefing.py
