name: 🚀 Bum Sports Automation (Cookie Mode)

on:
  schedule:
    - cron: '15 0 * * *'   # 매일 오전 9:15 (KST)
  workflow_dispatch:      # 수동 실행 버튼 활성화

jobs:
  run_script:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 코드 체크아웃
        uses: actions/checkout@v3

      - name: 🐍 Python 설정
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: 📦 의존성 및 Playwright 설치
        run: |
          python -m pip install --upgrade pip
          pip install playwright
          playwright install chromium
          playwright install-deps

      - name: 🚀 bum_sports.py 실행
        env:
          # 깃허브 Secrets에 등록한 이름과 똑같아야 합니다!
          NID_AUT: ${{ secrets.NID_AUT }}
          NID_SES: ${{ secrets.NID_SES }}
          NAVER_PASSWORD: ${{ secrets.NAVER_PASSWORD }}
        run: python bum_sports.py

      - name: ✅ 결과 보고
        if: success()
        run: echo "🎉 미션 완료! 블로그를 확인하세요."

      - name: ❌ 실패 보고
        if: failure()
        run: echo "⚠️ 미션 실패! 로그를 분석해야 합니다."
