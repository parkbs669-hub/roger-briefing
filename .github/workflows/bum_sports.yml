name: 🚀 Bum Sports Automation

on:
  schedule:
    - cron: '15 0 * * *'   # 매일 오전 9:15 (KST)
  workflow_dispatch:

jobs:
  run_script:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 코드 체크아웃
        uses: actions/checkout@v3

      - name: 🐍 Python 설정
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: 📦 의존성 설치
        run: |
          python -m pip install --upgrade pip
          pip install playwright
          playwright install chromium
          playwright install-deps

      - name: 🚀 bum_sports.py 실행
        env:
          NID_AUT: ${{ secrets.NID_AUT }}
          NID_SES: ${{ secrets.NID_SES }}
          NAVER_PASSWORD: ${{ secrets.NAVER_PASSWORD }}
        run: python bum_sports.py

      - name: 📸 스크린샷 업로드
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: naver-result-screen
          path: error_screenshot.png      # ← 이 부분이 py 파일과 일치해야 함
          retention-days: 1
          if-no-files-found: warn

      - name: ✅ 성공 보고
        if: success()
        run: echo "🎉 완료! $(TZ=Asia/Seoul date '+%Y-%m-%d %H:%M:%S')"

      - name: ❌ 실패 보고
        if: failure()
        run: echo "⚠️ 실패! 로그를 확인하세요."
