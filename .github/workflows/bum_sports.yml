name: 🚀 Bum Sports Final Mission

on:
  schedule:
    - cron: '15 0 * * *'
  workflow_dispatch:

jobs:
  run_script:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 코드 체크아웃
        uses: actions/checkout@v3

      - name: 🐍 Python 설정
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: 📦 의존성 설치
        run: |
          python -m pip install --upgrade pip
          pip install playwright
          playwright install chromium
          playwright install-deps

      - name: 🚀 bum_sports.py 실행
        env:
          NID_AUT: ${{ secrets.NID_AUT }}
          NID_SES: ${{ secrets.NID_SES }}
          NAVER_PASSWORD: ${{ secrets.NAVER_PASSWORD }}
        run: python bum_sports.py

      # 📸 실패하든 성공하든 결과 화면을 저장하여 사령관님께 보고합니다.
      - name: 📸 증거 사진 업로드 (Artifacts)
        if: always() 
        uses: actions/upload-artifact@v4
        with:
          name: naver-result-screen
          path: error_screenshot.png
          retention-days: 1 # 사진은 하루만 보관합니다.

      - name: ✅ 성공 보고
        if: success()
        run: echo "🎉 미션 완료!"
