- name: 🚀 bum_sports.py 실행
        env:
          NID_AUT: ${{ secrets.NID_AUT }}
          NID_SES: ${{ secrets.NID_SES }}
        run: python bum_sports.py

      - name: 📸 결과물 PNG 업로드
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bum-sports-result-image
          path: final_report.png          # ← zip 없이 png 파일만 직접 지정
          retention-days: 1
          if-no-files-found: error
