name: 🚀 Bum Sports Automation

on:
  schedule:
    - cron: '15 0 * * *'
    - cron: '45 5 * * *'
    - cron: '30 11 * * *'
  workflow_dispatch:

jobs:
  run_script:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 코드 체크아웃
        uses: actions/checkout@v3

      - name: 🐍 Python 설정
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: 📦 의존성 설치
        run: |
          python -m pip install --upgrade pip
          pip install playwright
          playwright install chromium
          playwright install-deps

      - name: 🕐 시간 확인
        run: |
          echo "UTC: $(date -u '+%Y-%m-%d %H:%M:%S')"
          echo "KST: $(TZ=Asia/Seoul date '+%Y-%m-%d %H:%M:%S')"

      - name: 🚀 bum_sports.py 실행
        env:
          NAVER_PASSWORD: ${{ secrets.NAVER_PASSWORD }}
        run: python bum_sports.py

      - name: ✅ 성공
        if: success()
        run: echo "🎉 완료! $(TZ=Asia/Seoul date '+%Y-%m-%d %H:%M:%S')"

      - name: ❌ 실패 시 로그
        if: failure()
        run: echo "⚠️ 실패! 로그를 확인하세요."
