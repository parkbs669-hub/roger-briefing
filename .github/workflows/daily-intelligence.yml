name: Weekly Intelligence Briefing

on:
  schedule:
    - cron: '0 22 * * 0'  # 매주 월요일 오전 7시 KST
  workflow_dispatch:

jobs:
  run-intelligence:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install packages
        run: |
          pip install requests
          pip install anthropic
          pip install google-generativeai

      - name: Run Intelligence System
        env:
          ANTHROPIC_API_KEY:    ${{ secrets.ANTHROPIC_API_KEY }}
          G2B_API_KEY:          ${{ secrets.G2B_API_KEY }}
          NAVER_ADDRESS:        ${{ secrets.NAVER_ADDRESS }}
          NAVER_PASSWORD:       ${{ secrets.NAVER_PASSWORD }}
          NAVER_CLIENT_ID:      ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET:  ${{ secrets.NAVER_CLIENT_SECRET }}
        run: python daily_intelligence.py
