name: Daily Beom SF Checker

on:
  schedule:
    - cron: '0 23 * * *' # 매일 아침 8시 (한국 시간)
  workflow_dispatch: 

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: 파이썬 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 라이브러리 설치
        run: pip install requests

      - name: 범 SF 봇 실행
        env:
          NL_API_KEY: ${{ secrets.NL_API_KEY }}
          NAVER_PASSWORD: ${{ secrets.NAVER_PASSWORD }}
        run: python beom_sf_bot.py
