name: Weekly_Pattern_Analysis
on:
  schedule:
    - cron: '0 9 * * 5'  # 매주 금요일 오후 6시 KST
  workflow_dispatch:

permissions:
  contents: write  # 누적 패턴 자동 커밋을 위한 쓰기 권한

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # GH_PAT 사전 확인 (MyVault_Roger 체크아웃에 필요)
      - name: GH_PAT 유효성 확인
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          if [ -z "$GH_PAT" ]; then
            echo "::error title=GH_PAT 누락::GH_PAT secret이 설정되지 않았습니다."
            echo "해결: Settings > Secrets and variables > Actions > New repository secret"
            echo "  이름: GH_PAT  |  값: repo 권한을 가진 Personal Access Token"
            exit 1
          fi

      - uses: actions/checkout@v4
        with:
          repository: parkbs669-hub/MyVault_Roger
          token: ${{ secrets.GH_PAT }}
          path: vault

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install requests anthropic

      - env:
          ANTHROPIC_API_KEY:   ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY:      ${{ secrets.GEMINI_API_KEY }}
          VAULT_DIR:           vault
          PROJECTS_DIR:        data/projects
          PATTERNS_DIR:        data/patterns
        run: python pattern_analyzer.py

      # 누적 데이터를 roger-briefing에 커밋 (복리 저장)
      - name: 누적 패턴 데이터 저장
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/projects/ data/patterns/
          git diff --staged --quiet || git commit -m "chore: 주간 패턴 분석 누적 업데이트 $(date '+%Y-W%V')"
          git push
