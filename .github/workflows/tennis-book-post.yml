name: Weekly Tennis Book Post

on:
  schedule:
    - cron: '0 23 * * 0'   # 매주 일요일 23:00 UTC = 월요일 08:00 KST
  workflow_dispatch:         # 수동 실행 가능 (테스트용)

permissions:
  contents: write
  
jobs:
  post-tennis-books:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install openai requests selenium feedparser

      - name: Set up Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Set up ChromeDriver
        uses: nanasess/setup-chromedriver@v2

      - name: Run tennis book poster
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ALADIN_API_KEY: ${{ secrets.ALADIN_API_KEY }}
          GOOGLE_BOOKS_API_KEY: ${{ secrets.GOOGLE_BOOKS_API_KEY }}
          NL_API_KEY: ${{ secrets.NL_API_KEY }}
          NAVER_ADDRESS: ${{ secrets.NAVER_ADDRESS }}
          NAVER_PASSWORD: ${{ secrets.NAVER_PASSWORD }}
          KAKAO_ID: ${{ secrets.KAKAO_ID }}
          KAKAO_PW: ${{ secrets.KAKAO_PW }}
        run: |
          python tennis_book_poster.py

      - name: Commit and Push seen file
        run: |
          # 1. Git 사용자 설정
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # 2. 방어 로직: data 폴더와 json 파일이 없을 경우 강제 생성
          # 파이썬 코드에서 생성을 실패하더라도 여기서 git add 에러를 막아줍니다.
          mkdir -p data
          if [ ! -f data/tennis_books_seen.json ]; then
            echo "[]" > data/tennis_books_seen.json
          fi

          # 3. 변경사항 스테이징
          git add data/tennis_books_seen.json
          
          # 4. 조건부 커밋 및 푸시
          # 변경된 내용(새로운 ISBN 등)이 있을 때만 커밋을 실행합니다.
          # 변경사항이 없으면 'git diff'가 참이 되어 뒤의 커밋 명령어를 실행하지 않고 조용히 종료됩니다.
          git diff --staged --quiet || (git commit -m "chore: update tennis books seen list" && git push)
