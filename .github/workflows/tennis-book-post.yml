name: Weekly Tennis Book Post

on:
  schedule:
    - cron: '0 23 * * 0'   # 매주 일요일 23:00 UTC = 월요일 08:00 KST
  workflow_dispatch:         # 수동 실행 가능

jobs:
  post-tennis-books:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install openai requests selenium

      - name: Set up Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Set up ChromeDriver
        uses: nanasess/setup-chromedriver@v2

      - name: Run tennis book poster
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ALADIN_API_KEY: ${{ secrets.ALADIN_API_KEY }}
          GOOGLE_BOOKS_API_KEY: ${{ secrets.GOOGLE_BOOKS_API_KEY }}
          NL_API_KEY: ${{ secrets.NL_API_KEY }}
          NAVER_ADDRESS: ${{ secrets.NAVER_ADDRESS }}
          NAVER_PASSWORD: ${{ secrets.NAVER_PASSWORD }}
        run: |
          python tennis_book_poster.py

      - name: Commit seen file
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # 1. data 디렉토리가 없으면 생성
          mkdir -p data
          
          # 2. 파일이 없으면 빈 JSON 파일([]) 생성 (git add 에러 방지용)
          if [ ! -f data/tennis_books_seen.json ]; then
            echo "[]" > data/tennis_books_seen.json
          fi

          # 3. 파일 스테이징
          git add data/tennis_books_seen.json
          
          # 4. 변경사항이 있는 경우에만 커밋 및 푸시
          git diff --staged --quiet || (git commit -m "chore: update tennis books seen list" && git push)
