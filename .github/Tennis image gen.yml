name: 🎾 Daily Tennis Image Generator

on:
  schedule:
    - cron: '0 22 * * *'   # 매일 오전 7시 KST (UTC 22:00 전날)
  workflow_dispatch:         # 수동 실행 버튼

jobs:
  generate-images:
    runs-on: ubuntu-latest

    permissions:
      contents: write        # 이미지 커밋을 위해 필요

    steps:
      - name: 📥 체크아웃
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 🐍 Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 패키지 설치
        run: |
          pip install openai requests

      - name: 🎾 이미지 생성
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python generate_tennis_images.py

      - name: 📤 GitHub에 커밋 & 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add images/ gallery.html
          git diff --cached --quiet || git commit -m "🎾 Daily tennis images - $(date +'%Y-%m-%d')"
          git push
